# =============================================================================
# ORCHESTRATION ENGINE
# =============================================================================

orchestration:
  # Engine execution priority when multiple engines are eligible
  engine_priority_order:
    - "sla113_revenue_engine"  # Highest priority: revenue optimization
    - "sla113_narrative_engine"  # Narrative coherence
    - "sla113_adaptive_engine"  # Adaptive difficulty
    - "sla113_identity_engine"  # Player personalization
    - "sla113_governance_engine"  # Regulatory compliance (always last)
  
  # Conflict resolution: how to handle when engines disagree
  conflict_resolution_matrix:
    revenue_vs_narrative:
      priority: "revenue"
      fallback: "narrative"
      weight_revenue: 0.7
      weight_narrative: 0.3
    
    revenue_vs_adaptive:
      priority: "revenue"
      fallback: "adaptive"
      weight_revenue: 0.6
      weight_adaptive: 0.4
    
    revenue_vs_identity:
      priority: "identity"
      fallback: "revenue"
      weight_identity: 0.55
      weight_revenue: 0.45
    
    revenue_vs_governance:
      priority: "governance"
      fallback: "none"  # Never override governance
      weight_governance: 1.0
    
    narrative_vs_adaptive:
      priority: "narrative"
      fallback: "adaptive"
      weight_narrative: 0.6
      weight_adaptive: 0.4
    
    narrative_vs_identity:
      priority: "identity"
      fallback: "narrative"
      weight_identity: 0.6
      weight_narrative: 0.4
    
    narrative_vs_governance:
      priority: "governance"
      fallback: "none"
      weight_governance: 1.0
    
    adaptive_vs_identity:
      priority: "adaptive"
      fallback: "identity"
      weight_adaptive: 0.55
      weight_identity: 0.45
    
    adaptive_vs_governance:
      priority: "governance"
      fallback: "none"
      weight_governance: 1.0
    
    identity_vs_governance:
      priority: "governance"
      fallback: "none"
      weight_governance: 1.0
  
  # Temporal coherence: time-based state consistency
  temporal_coherence:
    session_state_ttl_seconds: 3600  # 1 hour
    narrative_state_ttl_seconds: 86400  # 24 hours
    player_profile_cache_ttl_seconds: 604800  # 7 days
    engine_decision_audit_retention_days: 90
  
  # Cinematic weighting overrides per tenant
  cinematic_weighting:
    default: 0.6
    high_volatility_boost: 0.15  # +0.15 for high volatility games
    bonus_feature_multiplier: 1.5  # 1.5x during bonus rounds
    late_session_boost: 0.1  # +0.1 in final 20% of session
  
  # Identity bias: how much to personalize
  identity_bias:
    player_preference_weight: 0.4
    player_history_weight: 0.3
    demographic_weight: 0.2
    randomness_weight: 0.1
  
  # Economic bias: how much revenue influences decisions
  economic_bias:
    house_edge_priority_weight: 0.5
    player_satisfaction_weight: 0.3
    volatility_management_weight: 0.2

# =============================================================================
# DASHBOARD (Operator UI Configuration)
# =============================================================================

dashboard:
  panels:
    analytics:
      enabled: true
      name: "Real-Time Analytics"
      description: "Live player activity, session metrics, revenue"
      default_visible: true
      widgets:
        - "active_players_gauge"
        - "revenue_ytd_chart"
        - "machine_occupancy_map"
        - "player_retention_metric"
    
    tenant_management:
      enabled: true
      name: "Tenant Management"
      description: "Tenant configuration, theme management, overrides"
      default_visible: true
      widgets:
        - "tenant_list"
        - "theme_editor"
        - "revenue_routing_config"
        - "cluster_assignment"
    
    machine_catalog:
      enabled: true
      name: "Machine Catalog"
      description: "Game library, machine configuration, deployment"
      default_visible: true
      widgets:
        - "machine_type_selector"
        - "rtp_configurator"
        - "volatility_tuner"
        - "theme_assignment"
    
    revenue:
      enabled: true
      name: "Revenue & Accounting"
      description: "Revenue tracking, payouts, account reconciliation"
      default_visible: true
      widgets:
        - "revenue_dashboard"
        - "payout_audit_log"
        - "account_reconciliation"
        - "partner_settlement"
    
    regulatory:
      enabled: true
      name: "Compliance & Regulatory"
      description: "Jurisdiction rules, audit trails, self-exclusion enforcement"
      default_visible: true
      widgets:
        - "jurisdiction_rules"
        - "audit_trail_viewer"
        - "self_exclusion_list"
        - "session_limits_monitor"
    
    narrative:
      enabled: true
      name: "Narrative Orchestration"
      description: "Story beats, player journey, emotional state"
      default_visible: false  # Advanced feature, hidden by default
      widgets:
        - "narrative_beat_timeline"
        - "player_emotional_state"
        - "story_arc_editor"
        - "beat_effectiveness_metrics"
  
  # Permission sets: role-based access control
  permissions:
    operator_standard:
      roles: ["operator", "manager"]
      allowed_panels:
        - "analytics"
        - "machine_catalog"
        - "revenue"
      allowed_actions:
        - "view_analytics"
        - "view_machines"
        - "view_revenue"
        - "export_reports"
    
    operator_advanced:
      roles: ["senior_operator", "director"]
      allowed_panels:
        - "analytics"
        - "tenant_management"
        - "machine_catalog"
        - "revenue"
        - "regulatory"
      allowed_actions:
        - "view_all"
        - "edit_machine_config"
        - "edit_tenant_config"
        - "edit_revenue_routing"
    
    operator_executive:
      roles: ["executive", "cfo"]
      allowed_panels:
        - "analytics"
        - "revenue"
        - "regulatory"
      allowed_actions:
        - "view_analytics"
        - "view_revenue"
        - "export_reports"
        - "view_compliance"
    
    engineer_platform:
      roles: ["platform_engineer", "sre"]
      allowed_panels:
        - "analytics"
        - "narrative"
      allowed_actions:
        - "view_all"
        - "debug_orchestration"
        - "view_engine_logs"
        - "adjust_weights"

# =============================================================================
# REGULATORY PROFILES (Jurisdiction-specific rules)
# =============================================================================

regulatory_profiles:
  nevada_lvcc:
    jurisdiction: "Nevada, USA (Las Vegas Convention & Visitors Authority)"
    min_rtp: 0.90
    max_rtp: 0.98
    age_gate_minimum: 21
    self_exclusion_required: true
    payout_audit_frequency_hours: 1
    session_time_limit_minutes: 480  # 8 hours max
    betting_limits:
      min_bet: 0.01
      max_bet: 500.00
    responsible_gaming:
      loss_limit_per_session_pct: 0.50
      loss_limit_weekly_pct: 0.30
      session_break_frequency_minutes: 120  # Mandatory break every 2 hours
    tax_rate_pct: 0.06  # 6% gaming tax
  
  uk_gbga:
    jurisdiction: "United Kingdom (Gambling Commission)"
    min_rtp: 0.85
    max_rtp: 0.99
    age_gate_minimum: 18
    self_exclusion_required: true
    payout_audit_frequency_hours: 4
    session_time_limit_minutes: 300  # 5 hours max
    betting_limits:
      min_bet: 0.05
      max_bet: 10.00
    responsible_gaming:
      loss_limit_per_session_pct: 0.40
      loss_limit_daily_pct: 0.20
      session_break_frequency_minutes: 60  # Mandatory break every 1 hour
    tax_rate_pct: 0.12  # 12% remote gaming duty
  
  australia_ilga:
    jurisdiction: "Australia (Illyarrie Gambling Authority)"
    min_rtp: 0.87
    max_rtp: 0.98
    age_gate_minimum: 18
    self_exclusion_required: true
    payout_audit_frequency_hours: 2
    session_time_limit_minutes: 360  # 6 hours max
    betting_limits:
      min_bet: 0.10
      max_bet: 50.00
    responsible_gaming:
      loss_limit_per_session_pct: 0.45
      loss_limit_weekly_pct: 0.25
      session_break_frequency_minutes: 90  # Mandatory break every 1.5 hours
    tax_rate_pct: 0.10  # 10% state gaming duty

  us_ca_high_compliance:
    jurisdiction: "California, USA (Bureau of Gambling Control — High Compliance)"
    min_rtp: 0.92
    max_rtp: 0.97
    age_gate_minimum: 21
    self_exclusion_required: true
    payout_audit_frequency_hours: 1
    session_time_limit_minutes: 360  # 6 hours max
    betting_limits:
      min_bet: 0.01
      max_bet: 200.00
    responsible_gaming:
      loss_limit_per_session_pct: 0.30  # 30% of buy-in per session (strict)
      loss_limit_daily_pct: 0.15        # 15% of balance per day
      loss_limit_weekly_pct: 0.20
      session_break_frequency_minutes: 60  # Mandatory break every 1 hour
    tax_rate_pct: 0.08  # 8% state gaming tax

# =============================================================================
# CLUSTERS (Geographic Deployment)
# =============================================================================

