# SLA113 MAXIMUM-CONTROL BUILD SPEC
# Complete, fully populated SLA113 operating system configuration
# Matches JSON Schema for Phase 6 deployment
# Version: 1.0.0
# Created: 2026-03-03

---
api_version: "1.0.0"
kind: SLA113BuildSpec
metadata:
  build_id: "sla113-prod-2026-03"
  version: "1.0.0"
  created_at: "2026-03-03T14:41:00Z"
  created_by: "Copilot-CLI"
  notes: "Full maximum-control SLA113 OS configuration for multi-tenant commercial deployment"

# =============================================================================
# GLOBAL OS BEHAVIOR
# =============================================================================

orchestration_mode: "reactive"  # reactive | event-driven | schedule-driven | hybrid
default_narrative_beat: "ambient"  # ambient | climactic | tutorial | endgame
default_session_memory_mode: "stateful"  # stateless | stateful | ephemeral
adaptive_difficulty_enabled: true
identity_personalization_enabled: true
economic_state_influence_enabled: true
cinematic_weighting_default: 0.6  # 0.0 (mechanical) to 1.0 (cinematic)

# =============================================================================
# CANON LAYERS (Economic, Shell, Fault, Governance)
# =============================================================================

canon:
  economic:
    currency: "USD"
    house_edge_base: 0.05  # 5% base house edge
    rtp_minimum: 0.90  # 90% minimum return to player
    rtp_maximum: 0.98  # 98% maximum RTP
    betting_unit_minimum: 0.01
    betting_unit_maximum: 500.00
    session_buy_in_minimum: 10.00
    session_buy_in_maximum: 10000.00
    volatility_tiers:
      low:
        min: 0.0
        max: 0.3
        rtp_default: 0.96
        narrative_beat: "ambient"
      medium:
        min: 0.3
        max: 0.7
        rtp_default: 0.95
        narrative_beat: "climactic"
      high:
        min: 0.7
        max: 1.0
        rtp_default: 0.90
        narrative_beat: "endgame"
    loss_limit_per_session_pct: 0.50  # Player can lose max 50% of buy-in
    win_ceiling_multiplier: 100.0  # Max payout 100x bet
    frequency_of_win_events:
      rate_per_session: 0.35  # ~35% sessions contain at least one win
      average_between_wins_spins: 8

  shell:
    reel_count_standard: 5
    payline_count_standard: 20
    symbol_count_unique: 12
    animation_frame_rate: 60
    transition_speed_milliseconds: 400
    audio_sample_rate: 48000
    audio_bit_depth: 24
    video_codec: "h264"
    video_resolution_max: "1920x1080"

  fault:
    session_timeout_idle_minutes: 30
    session_timeout_max_duration_hours: 8
    max_consecutive_losses_before_warning: 10
    max_consecutive_losses_before_halt: 25
    network_latency_threshold_milliseconds: 500
    rng_seed_rotation_every_spins: 1000
    fault_detection_interval_seconds: 5

  governance:
    age_gate_minimum: 21
    geofence_enabled: true
    self_exclusion_enforcement: true
    time_of_day_restrictions_enabled: true
    restricted_hours_start: "03:00"  # 3 AM
    restricted_hours_end: "06:00"  # 6 AM
    max_players_per_machine: 1
    max_concurrent_sessions_per_player: 1
    session_activity_logging: true
    payout_audit_frequency_hours: 1

# =============================================================================
# MACHINE PROFILES (Fish, Slots, Keno, Custom)
# =============================================================================

machine_profiles:
  fish:
    enabled: true
    display_name: "Arcade Fish Game"
    description: "Action-oriented arcade fishing game with instant payouts"
    default_rtp: 0.94
    default_volatility: 0.5
    narrative_beat_primary: "climactic"
    sessions_per_day_target: 100
    revenue_contribution_pct: 0.15
    player_skill_factor: 0.3  # 30% skill, 70% chance
    payoff_structure:
      catch_rates:
        common: 0.70
        uncommon: 0.25
        rare: 0.04
        epic: 0.01
      multipliers:
        common: 1.0
        uncommon: 3.0
        rare: 10.0
        epic: 50.0

  slots:
    enabled: true
    display_name: "Classic Slots"
    description: "Traditional 5-reel, 20-payline slot games with bonus features"
    default_rtp: 0.95
    default_volatility: 0.6
    narrative_beat_primary: "climactic"
    sessions_per_day_target: 200
    revenue_contribution_pct: 0.60
    player_skill_factor: 0.0  # Pure chance
    themes:
      - "gold_rush"
      - "ancient_egypt"
      - "space_odyssey"
      - "wild_west"
    bonus_features:
      free_spins_enabled: true
      multiplier_bonus_enabled: true
      progressive_jackpot_enabled: true
      progressive_pool_contribution_pct: 0.02

  keno:
    enabled: true
    display_name: "Keno"
    description: "Fast-paced number selection game with instant results"
    default_rtp: 0.93
    default_volatility: 0.4
    narrative_beat_primary: "ambient"
    sessions_per_day_target: 150
    revenue_contribution_pct: 0.15
    player_skill_factor: 0.0  # Pure chance
    max_numbers_selectable: 20
    draw_frequency_seconds: 60
    payout_table:
      match_5: 1.0
      match_10: 5.0
      match_15: 20.0
      match_20: 500.0

  custom:
    enabled: true
    display_name: "Partner Custom Games"
    description: "White-label games from partner studios"
    default_rtp: 0.94
    default_volatility: 0.5
    narrative_beat_primary: "ambient"
    sessions_per_day_target: 50
    revenue_contribution_pct: 0.10
    partner_revenue_split_pct: 0.30  # Partner takes 30%, operator 70%

