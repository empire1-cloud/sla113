# =============================================================================
# ANTI-ADDICTION PROFILE
# =============================================================================

anti_addiction_profile:
  session_limits:
    absolute_max_session_duration_hours: 8
    recommended_session_duration_minutes: 60
    mandatory_break_frequency_minutes: 60
    mandatory_break_duration_minutes: 15
  
  loss_limits:
    daily_loss_limit_pct: 0.20  # Limit daily losses to 20% of balance
    weekly_loss_limit_pct: 0.25
    monthly_loss_limit_pct: 0.30
    loss_limit_enforcement: "hard"  # hard | warning | disabled
  
  deposit_limits:
    daily_deposit_limit: 500.00
    weekly_deposit_limit: 2000.00
    monthly_deposit_limit: 5000.00
    deposit_limit_enforcement: "soft"  # soft=warning, hard=block
  
  self_exclusion:
    enabled: true
    minimum_exclusion_period_days: 7
    maximum_exclusion_period_days: 5475  # ~15 years
    cool_off_minimum_hours: 24  # 24-hour cool-off period
  
  player_activity_monitoring:
    monitor_consecutive_play_sessions: true
    alert_after_consecutive_sessions: 5
    alert_after_total_daily_minutes: 480  # 8 hours
    alert_after_daily_losses_pct: 0.15
    alert_notification_method: "email"

# =============================================================================
# DEPLOYMENT METADATA
# =============================================================================

deployment:
  environment: "production"
  rollout_strategy: "canary"  # canary | blue-green | rolling
  canary_percentage: 10  # 10% of traffic to new build
  health_check_enabled: true
  health_check_interval_seconds: 30
  graceful_shutdown_timeout_seconds: 30
  log_level: "info"  # debug | info | warn | error
  metrics_enabled: true
  tracing_enabled: true
  profiling_enabled: false

# =============================================================================
# NOTES & REFERENCES
# =============================================================================

notes: |
