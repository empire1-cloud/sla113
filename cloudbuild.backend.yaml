steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sla113-backend', '-f', 'Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sla113-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', 'sla113-backend', '--image', 'gcr.io/$PROJECT_ID/sla113-backend', '--region', 'us-central1', '--allow-unauthenticated', '--port', '8080']
images:
  - 'gcr.io/$PROJECT_ID/sla113-backend'
