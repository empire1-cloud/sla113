<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Aztec Abyss — SLA113 Vertical Slice</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="shell" aria-label="Aztec Abyss fish shooter demo">
    <div id="game-container"></div>

    <header class="top-hud" aria-live="polite">
      <section class="brand-block">
        <span class="eyebrow">SLA113 ORIGINAL</span>
        <strong>AZTEC ABYSS</strong>
        <span id="wave-label">WAVE 1</span>
      </section>

      <section class="jackpot-block">
        <span class="jackpot-label">SUN TEMPLE METER</span>
        <div class="meter-track" aria-label="Sun Temple meter">
          <div id="temple-meter" class="meter-fill"></div>
        </div>
        <span id="temple-value">0%</span>
      </section>

      <section class="status-block">
        <span>DEMO CREDITS</span>
        <strong id="credits-value">10,000.00</strong>
        <span id="combo-value">NO COMBO</span>
      </section>
    </header>

    <aside class="boss-hud" id="boss-hud" hidden>
      <div class="boss-copy">
        <span>BOSS</span>
        <strong id="boss-name">QUETZAL LEVIATHAN</strong>
        <span id="boss-phase">PHASE I</span>
      </div>
      <div class="boss-track"><div id="boss-fill"></div></div>
    </aside>

    <section class="lock-panel" aria-live="polite">
      <span>LOCK</span>
      <strong id="lock-value">NONE</strong>
      <small id="hint-value">Tap a creature or press L</small>
    </section>

    <footer class="control-dock">
      <div class="bet-control">
        <button id="bet-down" type="button" aria-label="Decrease power">−</button>
        <div><span>POWER</span><strong id="bet-value">0.10</strong></div>
        <button id="bet-up" type="button" aria-label="Increase power">+</button>
      </div>

      <div class="weapon-grid" role="group" aria-label="Weapons">
        <button class="weapon active" data-weapon="sunbolt" type="button">
          <span>1</span><strong>SUN BOLT</strong><small>FAST · 1×</small>
        </button>
        <button class="weapon" data-weapon="jadenet" type="button">
          <span>2</span><strong>JADE NET</strong><small>SLOW · 4×</small>
        </button>
        <button class="weapon" data-weapon="obsidian" type="button">
          <span>3</span><strong>OBSIDIAN</strong><small>BURST · 8×</small>
        </button>
      </div>

      <div class="action-grid">
        <button id="lock-toggle" type="button"><strong>LOCK</strong><small>L</small></button>
        <button id="auto-toggle" type="button"><strong>AUTO</strong><small>A</small></button>
        <button id="relic-trigger" type="button"><strong>RELIC</strong><small>F</small></button>
      </div>
    </footer>

    <div id="toast" role="status" aria-live="assertive"></div>
    <div class="demo-badge">VIRTUAL-CREDIT DEMO · NO CASH VALUE</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
