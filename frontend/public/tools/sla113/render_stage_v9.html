<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RENDER_STAGE_V9</title>
    <style>
        :root {
            --black: #050505;
            --accent: #00ffff;
            --gold: #ffcc00;
            --panel: #0f0f0f;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--black); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Slim Header */
        header {
            height: 40px;
            background: var(--panel);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Content Area */
        main { padding: 30px; }

        .group-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-label::after { content: ""; flex: 1; height: 1px; background: #222; }

        /* Grid */
        .render-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        /* Studio Asset Card */
        .asset-box {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.1s;
        }

        .asset-box:hover { border-color: var(--accent); }

        .preview {
            width: 100%;
            aspect-ratio: 16/9;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .preview img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            /* High-end rendering fix */
            image-rendering: -webkit-optimize-contrast;
        }

        .info {
            padding: 12px;
            background: var(--panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filename { font-size: 11px; font-family: 'Monaco', monospace; color: #888; }
        .type-tag { font-size: 9px; padding: 2px 6px; border: 1px solid #333; border-radius: 2px; }

        /* Footer HUD */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #222;
            display: flex;
            padding: 15px 30px;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .stats { display: flex; gap: 40px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); }
        .stat-value.gold { color: var(--gold); }

        .actions { display: flex; gap: 12px; }
        .btn {
            height: 36px;
            padding: 0 24px;
            border-radius: 4px;
            border: none;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-main { background: var(--accent); color: #000; }
        .btn-alt { background: #222; color: #fff; }
        .btn:active { opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <div>SLA113 // PRODUCTION_VIEW</div>
    <div id="clock">00:00:00</div>
</header>

<main>
    <div class="group-label">Module A // Target Units</div>
    <div class="render-grid" id="grid-a">
        <!-- Dynamic load from API -->
    </div>

    <div class="group-label">Module S // Logic Units</div>
    <div class="render-grid" id="grid-s">
        <!-- Dynamic load from API -->
    </div>
</main>

<footer>
    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">Wallet Balance</span>
            <span class="stat-value gold" id="val-gems">0.00</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Total Load</span>
            <span class="stat-value" id="val-load">40 Units</span>
        </div>
    </div>
    
    <div class="actions">
        <button class="btn btn-alt" onclick="send('reject')">Discard</button>
        <button class="btn btn-main" onclick="send('approve')">Approve Render</button>
    </div>
</footer>

<script>
    const api = {
        state: '/api/foundry/api/audit-state',
        post: '/api/foundry/api'
    };

    function update() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        fetch(api.state).then(r=>r.json()).then(d=>{
            document.getElementById('val-gems').innerText = parseFloat(d.gems||0).toFixed(2);
            document.getElementById('val-load').innerText = (d.total_units||0) + ' Units';
            
            // Render Module A
            const gridA = document.getElementById('grid-a');
            gridA.innerHTML = (d.module_a_assets||[]).map(asset => `
                <div class="asset-box">
                    <div class="preview"><img src="/assets/${asset.file}" onerror="this.src='https://placehold.co/400x225/0a0a0a/e0e0e0?text=${asset.file}'"></div>
                    <div class="info">
                        <span class="filename">${asset.file}</span>
                        <span class="type-tag">${asset.type}</span>
                    </div>
                </div>
            `).join('');

            // Render Module S
            const gridS = document.getElementById('grid-s');
            gridS.innerHTML = (d.module_s_assets||[]).map(asset => `
                <div class="asset-box">
                    <div class="preview"><img src="/assets/${asset.file}" onerror="this.src='https://placehold.co/400x225/0a0a0a/e0e0e0?text=${asset.file}'"></div>
                    <div class="info">
                        <span class="filename">${asset.file}</span>
                        <span class="type-tag" style="border-color:${asset.type === 'GOLD' ? 'var(--gold)' : '#333'}; color:${asset.type === 'GOLD' ? 'var(--gold)' : 'inherit'};">${asset.type}</span>
                    </div>
                </div>
            `).join('');

        }).catch(()=>{});
    }

    async function send(mode) {
        const route = mode === 'approve' ? '/approve' : '/reject';
        const payload = mode === 'approve' ? {mode:'arcade_hybrid'} : {prompt:'Universal Regen'};
        await fetch(api.post + route, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });
        location.reload();
    }

    setInterval(update, 2000);
    update();
</script>
</body>
</html>
